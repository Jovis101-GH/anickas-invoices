<style>
:root{
  --bg:#FAF6EF;
  --card:#FFFFFF;
  --ink:#2B2118;
  --ink-soft:#6B5F53;
  --line:#E8E0D3;
  --berry:#9C3A50;
  --berry-dark:#7C2C3E;
  --sage:#748067;
  --butter:#E3AE3F;
  --danger:#B23B3B;
  --radius:14px;
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Work Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
h1,h2,h3,.display{
  font-family:'Fraunces',serif;
  font-weight:600;
  letter-spacing:-0.01em;
  margin:0;
}
#app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  padding-bottom:calc(90px + var(--safe-bottom));
  background:var(--bg);
}
.topbar{
  position:sticky;top:0;z-index:20;
  background:var(--bg);
  padding:calc(18px + var(--safe-top)) 20px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);
}
.topbar .brand{display:flex;align-items:baseline;gap:8px;}
.topbar .brand h1{font-size:22px;color:var(--berry-dark);}
.topbar .brand span{font-size:12px;color:var(--ink-soft);font-family:'Work Sans';}
.icon-btn{
  width:38px;height:38px;border-radius:50%;
  border:1px solid var(--line);background:var(--card);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--ink-soft);
  font-size:18px;
}
.icon-btn:active{transform:scale(0.94);}
.back-row{
  display:flex;align-items:center;gap:10px;
  padding:calc(16px + var(--safe-top)) 20px 4px;
}
.back-row .icon-btn{border:none;background:none;font-size:22px;padding:0;width:30px;}
.back-row h2{font-size:19px;}
.content{padding:16px 20px 20px;}
.search-row{padding:14px 20px 4px;}
.search-row input{
  width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);
  background:var(--card);font-family:'Work Sans';font-size:15px;color:var(--ink);
}
.search-row input:focus{outline:2px solid var(--berry);outline-offset:1px;}

.empty-state{
  text-align:center;padding:60px 30px 30px;color:var(--ink-soft);
}
.empty-state .stamp{
  width:76px;height:76px;border-radius:50%;
  border:2px dashed var(--berry);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;font-family:'Fraunces';font-style:italic;color:var(--berry);font-size:28px;
}
.empty-state p{margin:6px 0 0;font-size:14px;line-height:1.5;}

.inv-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;
  align-items:center;gap:10px;cursor:pointer;transition:transform .1s;
}
.inv-card:active{transform:scale(0.985);}
.inv-card .left{min-width:0;}
.inv-card .num{
  font-family:'Fraunces';font-style:italic;color:var(--berry-dark);font-size:13px;
}
.inv-card .name{font-weight:600;font-size:16px;margin-top:2px;}
.inv-card .job{font-size:13px;color:var(--ink-soft);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.inv-card .right{text-align:right;flex-shrink:0;}
.inv-card .amt{font-weight:700;font-size:16px;}
.inv-card .date{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.badge{
  display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;
  letter-spacing:.03em;text-transform:uppercase;margin-top:4px;
}
.badge.private{background:#EFEAE0;color:var(--ink-soft);}
.badge.business{background:#EFE0D9;color:var(--berry-dark);}

.fab{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(22px + var(--safe-bottom));
  width:min(440px,calc(100% - 40px));
  background:var(--berry);color:#fff;border:none;border-radius:16px;
  padding:16px;font-family:'Work Sans';font-weight:600;font-size:16px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 8px 20px rgba(124,44,62,.25);cursor:pointer;z-index:30;
}
.fab:active{transform:translateX(-50%) scale(.98);}

.type-pick{display:flex;flex-direction:column;gap:14px;margin-top:10px;}
.type-card{
  background:var(--card);border:1.5px solid var(--line);border-radius:18px;
  padding:22px;cursor:pointer;text-align:left;
}
.type-card:active{transform:scale(.99);}
.type-card .em{font-size:26px;}
.type-card h3{font-size:19px;margin-top:10px;color:var(--ink);}
.type-card p{font-size:13.5px;color:var(--ink-soft);margin-top:4px;line-height:1.45;}

.progress-dots{display:flex;gap:6px;padding:0 20px;margin-top:2px;}
.progress-dots span{height:4px;flex:1;border-radius:4px;background:var(--line);}
.progress-dots span.done{background:var(--berry);}

label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:16px 0 6px;text-transform:uppercase;letter-spacing:.03em;}
label:first-child{margin-top:0;}
input,textarea,select{
  width:100%;padding:12px 13px;border-radius:11px;border:1px solid var(--line);
  background:var(--card);font-family:'Work Sans';font-size:15.5px;color:var(--ink);
}
textarea{resize:vertical;min-height:60px;}
input:focus,textarea:focus,select:focus{outline:2px solid var(--berry);outline-offset:1px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hint{font-size:12px;color:var(--ink-soft);margin-top:5px;}

.item-card{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:14px;margin-bottom:12px;position:relative;
}
.item-card .rm{
  position:absolute;top:10px;right:10px;color:var(--danger);background:none;border:none;
  font-size:13px;font-weight:600;cursor:pointer;
}

function saveCustomItemsToMenu(items){
  const menu=loadMenu();
  const existingNames=new Set(menu.map(m=>m.name.trim().toLowerCase()));
  let added=0;
  items.forEach(it=>{
    if(!it.custom) return;
    const name=(it.desc||'').trim();
    if(!name) return;
    if(/delivery/i.test(name)) return;
    const key=name.toLowerCase();
    if(existingNames.has(key)) return;
    menu.push({cat:'Other', name, price:parseFloat(it.unitPrice)||0});
    existingNames.add(key);
    added++;
  });
  if(added>0) saveMenu(menu);
  return added;
}

const WEEKLY_BAKES_KEY='anickas_weekly_bakes_v1';
function isoWeekStamp(d){
  const dt=new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day=(dt.getUTCDay()+6)%7;
  dt.setUTCDate(dt.getUTCDate()-day+3);
  const firstThurs=new Date(Date.UTC(dt.getUTCFullYear(),0,4));
  const weekNo=1+Math.round(((dt-firstThurs)/86400000-3+((firstThurs.getUTCDay()+6)%7))/7);
  return dt.getUTCFullYear()+'-W'+String(weekNo).padStart(2,'0');
}
function loadWeeklyBakes(){
  try{
    const raw=JSON.parse(localStorage.getItem(WEEKLY_BAKES_KEY));
    if(raw && raw.week===isoWeekStamp(new Date())) return raw.categories;
  }catch(e){}
  return null;
}
function saveWeeklyBakes(categories){

  try{
    const raw=localStorage.getItem(CUSTOMERS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  saveCustomers(DEFAULT_CUSTOMERS);
  return DEFAULT_CUSTOMERS.slice();
}

function nextInvoiceNumber(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const yy=String(d.getFullYear()).slice(-2);
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const key=yy+mm;
  const seq=loadSeq();
  const next=(seq[key]||0)+1;
  return {number:key+String(next).padStart(2,'0'), key, next};
}

function uid(){ return 'i'+Date.now()+Math.random().toString(16).slice(2,8); }
function fmtMoney(n){ return 'R'+ (Math.round((n||0)*100)/100).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(iso){ const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}); }
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window._toastT); window._toastT=setTimeout(()=>t.classList.remove('show'),1800);
}

  if(localStorage.getItem(SEED_FLAG_KEY)) return;
  const existing=loadInvoices();
  if(existing.length===0){
    saveInvoices(SEED_JULY_INVOICES.map(inv=>JSON.parse(JSON.stringify(inv))));
    const seq=loadSeq(); seq['2607']=5; saveSeq(seq);
  }
  localStorage.setItem(SEED_FLAG_KEY,'1');
}

/* ---------- app state ---------- */
let state={ view:'home', search:'', draft:null, editingId:null, viewingId:null, monthFilter:'All' };

function insertItem(d, item){
  const deliveryIdx=d.items.findIndex(it=>/delivery/i.test(it.desc||''));
  if(deliveryIdx>=0){ d.items.splice(deliveryIdx, 0, item); }
  else { d.items.push(item); }
}
function computeItemTotal(it){
  const qty=parseFloat(it.qty)||0, price=parseFloat(it.unitPrice)||0, disc=parseFloat(it.discount)||0;
  return qty*(price-disc);
}
function computeSubtotal(items){ return items.reduce((s,it)=>s+computeItemTotal(it),0); }

function newDraft(type){
  return {
    id:null, type, date:todayISO(), job:'',
    customerName:'',
    docType:'invoice', // 'invoice' | 'proforma'
    revision:1, history:[],
    fulfillment:'collection', deliveryFee:0,
    client:{ name:'', addr1:'', addr2:'', addr3:'', contact:'', companyName:'', vatNo:'', contactPerson:'', email:'' },
    items:[],
    deposit:0, notes:''
  };
}
function displayInvoiceNumber(inv){ return (inv.revision && inv.revision>1) ? `${inv.number}_${inv.revision}` : inv.number; }
function monthKey(dateStr){ return (dateStr||'').slice(0,7); } // 'YYYY-MM'
function monthLabel(key){
  const [y,m]=key.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleDateString('en-ZA',{month:'long', year:'numeric'});
}

/* ---------- render root ---------- */
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if(state.view==='home') return renderHome(app);
  if(state.view==='pickType') return renderPickType(app);
  if(state.view==='weeklyBakes') return renderWeeklyBakes(app);
  if(state.view==='step1') return renderStep1(app);
  if(state.view==='step2') return renderStep2(app);
  if(state.view==='menuPicker') return renderMenuPicker(app);
  if(state.view==='cakeBuilder') return renderCakeBuilder(app);
  if(state.view==='manageMenu') return renderManageMenu(app);
  if(state.view==='manageCustomers') return renderManageCustomers(app);
  if(state.view==='step3') return renderStep3(app);
  if(state.view==='detail') return renderDetail(app);
  if(state.view==='revisionHistory') return renderRevisionHistory(app);
  if(state.view==='settings') return renderSettings(app);
}

/* ---------- HOME ---------- */
function renderHome(app){
  const bar=document.createElement('div');
  bar.className='topbar';
  bar.innerHTML=`<div class="brand"><h1>Anicka's</h1><span>Invoices</span></div>`;
  const settingsBtn=document.createElement('div');
  settingsBtn.className='icon-btn'; settingsBtn.innerHTML='&#9881;';
  settingsBtn.onclick=()=>{state.view='settings'; render();};
  bar.appendChild(settingsBtn);
  app.appendChild(bar);

  const searchRow=document.createElement('div');
  searchRow.className='search-row';
  searchRow.innerHTML=`<input placeholder="Search by client or job..." value="${escapeAttr(state.search)}">`;
  searchRow.querySelector('input').oninput=(e)=>{state.search=e.target.value; renderList();};
  app.appendChild(searchRow);

  const monthPillRow=document.createElement('div');
  monthPillRow.style.cssText='display:flex;gap:8px;overflow-x:auto;padding:10px 20px 4px;-webkit-overflow-scrolling:touch;';
  app.appendChild(monthPillRow);
  function drawMonthPills(){
    const all=loadInvoices();
    const months=[...new Set(all.map(inv=>monthKey(inv.date)))].sort().reverse();
    const pills=['All', ...months];
    monthPillRow.innerHTML = pills.map(m=>{
      const label = m==='All' ? 'All' : monthLabel(m);
      const on = state.monthFilter===m;
      return `<button class="cat-pill" data-month="${escapeAttr(m)}" style="flex-shrink:0;padding:9px 16px;border-radius:20px;font-family:'Work Sans';font-weight:600;font-size:13.5px;white-space:nowrap;border:1.5px solid var(--berry);cursor:pointer;background:${on?'var(--berry)':'var(--card)'};color:${on?'#fff':'var(--berry-dark)'};">${escapeHtml(label)}</button>`;
    }).join('');
    monthPillRow.querySelectorAll('.cat-pill').forEach(btn=>{
      btn.onclick=()=>{ state.monthFilter=btn.dataset.month; drawMonthPills(); renderList(); };
    });
  }
  drawMonthPills();

  const content=document.createElement('div');
  content.className='content';
  content.id='invoice-list';
  app.appendChild(content);

  const fab=document.createElement('button');
  fab.className='fab'; fab.innerHTML='&#43; New Invoice';
  fab.onclick=()=>{state.draft=null; state.view='pickType'; render();};
  app.appendChild(fab);

  renderList();
}

function renderList(){
  const content=document.getElementById('invoice-list');
  if(!content) return;
  const all=loadInvoices().sort((a,b)=> (b.date+b.number).localeCompare(a.date+a.number));
  const q=state.search.trim().toLowerCase();
  let list = state.monthFilter==='All' ? all : all.filter(inv=>monthKey(inv.date)===state.monthFilter);
  if(q){
    list=list.filter(inv=>{
      const name=(inv.client.name||inv.client.companyName||'').toLowerCase();
      return name.includes(q) || (inv.job||'').toLowerCase().includes(q) || inv.number.includes(q);
    });
  }

  content.innerHTML='';

  if(state.monthFilter!=='All' && !q){
    const formalTotal=list.filter(i=>i.docType!=='proforma').reduce((s,i)=>s+computeSubtotal(i.items)-(parseFloat(i.deposit)||0),0);
    const proformaCount=list.filter(i=>i.docType==='proforma').length;
    const summary=document.createElement('div');
    summary.className='kv-card';
    summary.style.marginBottom='12px';
    summary.innerHTML=`
      <div class="kv-row"><span>Invoiced this month</span><span style="font-weight:700;color:var(--berry-dark);">${fmtMoney(formalTotal)}</span></div>
      ${proformaCount?`<div class="kv-row"><span>Open quotes (not counted)</span><span>${proformaCount}</span></div>`:''}
    `;
    content.appendChild(summary);
  }

  if(list.length===0){
    const empty=document.createElement('div');
    empty.className='empty-state';
    empty.innerHTML=`<div class="stamp">A</div>
      <h3 class="display" style="font-size:18px;">${q?'No matches':'No invoices yet'}</h3>
      <p>${q?'Try a different search.':'Tap "New Invoice" below to create your first one.'}</p>`;
    content.appendChild(empty);
    return;
  }
  list.forEach(inv=>{
    const total=computeSubtotal(inv.items)-(parseFloat(inv.deposit)||0);
    const isProforma=inv.docType==='proforma';
    const hasDeposit=(parseFloat(inv.deposit)||0)>0;
    const card=document.createElement('div');
    card.className='inv-card';
    card.innerHTML=`
      <div class="left">
        <div class="num">#${displayInvoiceNumber(inv)}</div>
        <div class="name">${escapeHtml(inv.client.name||inv.client.companyName||'Untitled')}</div>
        <div class="job">${escapeHtml(inv.job||'')}</div>
        <span class="badge ${inv.type}">${inv.type==='business'?'Business':'Private'}</span>
        ${isProforma?`<span class="badge private" style="margin-left:4px;">Quote</span>`:''}
        ${inv.revision>1?`<span class="badge private" style="margin-left:4px;">Rev ${inv.revision}</span>`:''}
        ${hasDeposit?`<span class="badge business" style="margin-left:4px;background:#E3EFE2;color:#3D6B3D;">Deposit ${fmtMoney(inv.deposit)}</span>`:''}
      </div>
      <div class="right">
        <div class="amt">${fmtMoney(computeSubtotal(inv.items))}</div>
        <div class="date">${fmtDate(inv.date)}</div>
        ${hasDeposit?`<div style="font-size:11.5px;color:#3D6B3D;margin-top:2px;">Bal ${fmtMoney(total)}</div>`:''}
      </div>`;
    card.onclick=()=>{state.viewingId=inv.id; state.view='detail'; render();};
    content.appendChild(card);
  });
}

/* ---------- shared: back row + progress ---------- */
function backRow(title,onBack){
  const row=document.createElement('div'); row.className='back-row';
  row.innerHTML=`<div class="icon-btn">&#8592;</div><h2>${title}</h2>`;
  row.querySelector('.icon-btn').onclick=onBack;
  return row;
}
function progress(step){
  const p=document.createElement('div'); p.className='progress-dots';
  for(let i=1;i<=3;i++){ const s=document.createElement('span'); if(i<=step) s.className='done'; p.appendChild(s); }
  return p;
}
function numberBanner(d){
  const bar=document.createElement('div');
  bar.style.cssText='margin:14px 20px 0;padding:10px 14px;border-radius:10px;background:#F7ECEE;border:1px solid var(--berry);text-align:center;';
  if(state.editingId){
    bar.innerHTML=`<span style="font-family:'Fraunces';font-style:italic;color:var(--berry-dark);font-weight:600;">Editing Invoice #${escapeHtml(d.number||'')}</span>`;
    return bar;
  }
  const preview = d.manualNumber || nextInvoiceNumber(d.date).number;
  function showDisplay(){
    bar.innerHTML=`
      <span style="font-family:'Fraunces';font-style:italic;color:var(--berry-dark);font-weight:600;">Next up: #${escapeHtml(preview)}</span>
      <span style="font-size:12px;color:var(--ink-soft);">(assigned when you save)</span>
      <button id="number-edit-link" style="display:block;margin:6px auto 0;border:none;background:none;color:var(--berry-dark);font-size:12px;font-weight:600;text-decoration:underline;cursor:pointer;">Not the right number? Fix it</button>
    `;
    bar.querySelector('#number-edit-link').onclick=showEditor;
  }
  function showEditor(){
    bar.innerHTML=`
      <label style="margin-top:0;font-size:11px;text-align:center;">Set invoice number manually</label>
      <input type="text" id="number-manual-input" value="${escapeAttr(preview)}" inputmode="numeric" style="text-align:center;font-family:'Fraunces';font-style:italic;font-weight:600;color:var(--berry-dark);">
      <p class="hint" style="margin-top:6px;">Use this if another device already used this number — future invoices on this device will continue after whatever you set here.</p>
      <div class="row2" style="margin-top:8px;">
        <button class="btn-secondary" id="number-manual-cancel" style="margin-top:0;">Cancel</button>
        <button class="btn-secondary" id="number-manual-confirm" style="margin-top:0;background:var(--berry);color:#fff;">Use This Number</button>
      </div>
    `;
    bar.querySelector('#number-manual-cancel').onclick=showDisplay;
    bar.querySelector('#number-manual-confirm').onclick=()=>{
      const val=bar.querySelector('#number-manual-input').value.trim();
      if(!/^\d{6}$/.test(val)){ showToast('Enter a 6-digit number like 260706'); return; }
      if(loadInvoices().some(i=>i.number===val)){ showToast('That number is already used by an invoice on this device'); return; }
      d.manualNumber=val;
      render();
    };
  }
  showDisplay();
  return bar;
}

/* ---------- THIS WEEK'S BAKES (quick-start) ---------- */
function renderWeeklyBakes(app){
  const d=state.draft;
  app.appendChild(backRow("This Week's Bakes", ()=>{state.view='pickType'; render();}));
  const content=document.createElement('div'); content.className='content';

  const cats=bakeableCategories();
  const remembered=loadWeeklyBakes();
  const selected=new Set(remembered && remembered.length ? remembered : []);

  content.innerHTML=`
    <p style="color:var(--ink-soft);font-size:14px;margin:0 0 14px;line-height:1.5;">
      What's on the menu this week? Pick your categories and I'll drop in the most popular item from each — swap or remove anything once you're in the invoice.
    </p>
    <div id="cat-check-list"></div>
    <button class="btn-primary" id="bakes-continue">Continue</button>
    <button class="btn-ghost" id="bakes-skip" style="color:var(--ink-soft);">Skip — I'll add items myself</button>
  `;
  app.appendChild(content);

  const listEl=content.querySelector('#cat-check-list');
  function drawList(){
    listEl.innerHTML = cats.map(cat=>{
      const on=selected.has(cat);
      const pop=popularItem(cat);
      return `
        <div class="cat-check" data-cat="${escapeAttr(cat)}" style="display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border:1.5px solid ${on?'var(--berry)':'var(--line)'};background:${on?'#F7ECEE':'var(--card)'};border-radius:12px;margin-bottom:8px;cursor:pointer;">
          <div>
            <div style="font-weight:600;font-size:14.5px;">${escapeHtml(cat)}</div>
            ${pop?`<div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">Popular: ${escapeHtml(pop.name)}</div>`:''}
          </div>
          <div style="width:24px;height:24px;border-radius:50%;border:1.5px solid ${on?'var(--berry)':'var(--line)'};background:${on?'var(--berry)':'transparent'};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;">${on?'&#10003;':''}</div>
        </div>`;
    }).join('');
    listEl.querySelectorAll('.cat-check').forEach(row=>{
      row.onclick=()=>{
        const cat=row.dataset.cat;
        if(selected.has(cat)) selected.delete(cat); else selected.add(cat);
        drawList();
      };
    });
  }
  drawList();

  content.querySelector('#bakes-continue').onclick=()=>{
    saveWeeklyBakes([...selected]);
    selected.forEach(cat=>{
      const pop=popularItem(cat);
      if(pop) d.items.push({desc:pop.name, qty:1, unitPrice:pop.price, discount:0, cat});
    });
    state.view='step1'; render();
  };
  content.querySelector('#bakes-skip').onclick=()=>{
    state.view='step1'; render();
  };
}

/* ---------- STEP 1: client details ---------- */
function renderStep1(app){
  const d=state.draft;
  app.appendChild(backRow(state.editingId ? 'Edit Invoice' : 'Client Details', ()=>{
    if(state.editingId){ state.editingId=null; state.draft=null; state.view='detail'; }
    else { state.view='pickType'; }
    render();
  }));
  app.appendChild(progress(1));
  app.appendChild(numberBanner(d));
  const content=document.createElement('div'); content.className='content';

  const isBiz=d.type==='business';
  const s=loadSettings();
  const matchingCustomers=loadCustomers().filter(c=>c.type===d.type).sort((a,b)=>a.name.localeCompare(b.name));

  content.innerHTML=`
    <label style="margin-top:0;">Existing Customer</label>
    <select id="f-customer">
      <option value="">+ New Customer</option>
      ${matchingCustomers.map(c=>`<option value="${escapeAttr(c.name)}" ${c.name===d.customerName?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}
    </select>

    <label>Invoice Date</label>
    <input type="date" id="f-date" value="${d.date}">

    <label>Job / Description</label>
    <input type="text" id="f-job" placeholder="e.g. Birthday Cake, Quiche Order" value="${escapeAttr(d.job)}">

    <label>Document Type</label>
    <div class="row2">
      <button type="button" id="f-doctype-invoice" class="btn-secondary" style="margin-top:0;">Invoice</button>
      <button type="button" id="f-doctype-proforma" class="btn-secondary" style="margin-top:0;">Proforma (Quote)</button>
    </div>
    <p class="hint" id="doctype-hint"></p>

    ${isBiz?`
    <label>Company Name</label>
    <input type="text" id="f-company" placeholder="Company (Pty) Ltd" value="${escapeAttr(d.client.companyName)}">
    <label>VAT Number</label>
    <input type="text" id="f-vat" placeholder="4XX XXX XXXX" value="${escapeAttr(d.client.vatNo)}">
    <label>Contact Person</label>
    <input type="text" id="f-contactperson" placeholder="Name of contact" value="${escapeAttr(d.client.contactPerson)}">
    <div class="row2">
      <div><label>Email</label><input type="email" id="f-email" placeholder="name@company.co.za" value="${escapeAttr(d.client.email)}"></div>
      <div><label>Cell</label><input type="text" id="f-contact" placeholder="082 000 0000" value="${escapeAttr(d.client.contact)}"></div>
    </div>
    `:`
    <label>Client Name</label>
    <input type="text" id="f-name" placeholder="Full name" value="${escapeAttr(d.client.name)}">
    <label>Contact Number</label>
    <input type="text" id="f-contact" placeholder="082 000 0000" value="${escapeAttr(d.client.contact)}">
    `}

    <label>Fulfillment</label>
    <div class="row2">
      <button type="button" id="f-fulfil-collection" class="btn-secondary" style="margin-top:0;">Collection</button>
      <button type="button" id="f-fulfil-delivery" class="btn-secondary" style="margin-top:0;">Delivery</button>
    </div>

    <div id="delivery-fee-wrap" style="display:none;">
      <label>Delivery Fee</label>
      <input type="number" inputmode="decimal" id="f-deliveryfee" value="${d.deliveryFee||0}">
    </div>

    <label id="addr-label">${isBiz?'Business Address':'Address'}</label>
    <input type="text" id="f-addr1" placeholder="Street address" value="${escapeAttr(d.client.addr1)}" style="margin-bottom:8px;">
    <input type="text" id="f-addr2" placeholder="Suburb / area" value="${escapeAttr(d.client.addr2)}" style="margin-bottom:8px;">
    <input type="text" id="f-addr3" placeholder="City" value="${escapeAttr(d.client.addr3)}">
    <p class="hint" id="addr-hint" style="display:none;">Collection orders default to Anicka's address (Miami Place) — no need to enter the client's own address.</p>

    <button class="btn-primary" id="next-btn">Continue to Items</button>
  `;
  app.appendChild(content);

  function setDocTypeUI(mode){
    d.docType=mode;
    const invBtn=document.getElementById('f-doctype-invoice'), proBtn=document.getElementById('f-doctype-proforma');
    invBtn.style.background = mode==='invoice' ? 'var(--berry)' : 'var(--card)';
    invBtn.style.color = mode==='invoice' ? '#fff' : 'var(--ink)';
    proBtn.style.background = mode==='proforma' ? 'var(--berry)' : 'var(--card)';
    proBtn.style.color = mode==='proforma' ? '#fff' : 'var(--ink)';
    document.getElementById('doctype-hint').textContent = mode==='proforma'
      ? "A proforma is a quote — it won't count toward your invoiced totals until you mark it as approved."
      : 'A formal invoice — counts toward your invoiced totals.';
  }
  document.getElementById('f-doctype-invoice').onclick=()=>setDocTypeUI('invoice');
  document.getElementById('f-doctype-proforma').onclick=()=>setDocTypeUI('proforma');
  setDocTypeUI(d.docType||'invoice');

  function setFulfillUI(mode){
    d.fulfillment=mode;
    const collBtn=document.getElementById('f-fulfil-collection'), delBtn=document.getElementById('f-fulfil-delivery');
    collBtn.style.background = mode==='collection' ? 'var(--berry)' : 'var(--card)';
    collBtn.style.color = mode==='collection' ? '#fff' : 'var(--ink)';
    delBtn.style.background = mode==='delivery' ? 'var(--berry)' : 'var(--card)';
    delBtn.style.color = mode==='delivery' ? '#fff' : 'var(--ink)';
    document.getElementById('delivery-fee-wrap').style.display = mode==='delivery' ? 'block' : 'none';
    document.getElementById('addr-hint').style.display = mode==='collection' ? 'block' : 'none';
    if(mode==='collection'){
      document.getElementById('f-addr1').value=s.addressLines[0]||'';
      document.getElementById('f-addr2').value=s.addressLines[1]||'';
      document.getElementById('f-addr3').value='';
    }
  }
  document.getElementById('f-fulfil-collection').onclick=()=>setFulfillUI('collection');
  document.getElementById('f-fulfil-delivery').onclick=()=>setFulfillUI('delivery');
  setFulfillUI(d.fulfillment||'collection');

  function applyCustomer(name){
    const c=findCustomer(name);
    d.customerName=name;
    if(!c){
      // "New Customer" selected — clear fields and always default to collection
      if(isBiz){
        document.getElementById('f-company').value='';
        document.getElementById('f-vat').value='';
        document.getElementById('f-contactperson').value='';
        document.getElementById('f-email').value='';
        document.getElementById('f-contact').value='';
      } else {
        document.getElementById('f-name').value='';
        document.getElementById('f-contact').value='';
      }
      setFulfillUI('collection');
      return;
    }
    if(isBiz){
      document.getElementById('f-company').value=c.name;
      document.getElementById('f-vat').value=c.vatNo||'';
      document.getElementById('f-contactperson').value=c.contactPerson||'';
      document.getElementById('f-email').value=c.email||'';
      document.getElementById('f-contact').value=c.contact||'';
    } else {
      document.getElementById('f-name').value=c.name;
      document.getElementById('f-contact').value=c.contact||'';
    }
    setFulfillUI(c.fulfillment||'collection');
    if(c.fulfillment==='delivery'){
      document.getElementById('f-addr1').value=c.addr1||'';
      document.getElementById('f-addr2').value=c.addr2||'';
      document.getElementById('f-addr3').value=c.addr3||'';
      document.getElementById('f-deliveryfee').value=c.deliveryFee||0;
    }
  }
  document.getElementById('f-customer').onchange=(e)=>applyCustomer(e.target.value);

  document.getElementById('next-btn').onclick=()=>{
    d.date=document.getElementById('f-date').value || todayISO();
    d.job=document.getElementById('f-job').value.trim();
    d.client.addr1=document.getElementById('f-addr1').value.trim();
    d.client.addr2=document.getElementById('f-addr2').value.trim();
    d.client.addr3=document.getElementById('f-addr3').value.trim();
    d.deliveryFee=parseFloat(document.getElementById('f-deliveryfee')?.value)||0;
    if(isBiz){
      d.client.companyName=document.getElementById('f-company').value.trim();
      d.client.vatNo=document.getElementById('f-vat').value.trim();
      d.client.contactPerson=document.getElementById('f-contactperson').value.trim();
      d.client.email=document.getElementById('f-email').value.trim();
      d.client.contact=document.getElementById('f-contact').value.trim();
      if(!d.client.companyName){ showToast('Please add a company name'); return; }
    } else {
      d.client.name=document.getElementById('f-name').value.trim();
      d.client.contact=document.getElementById('f-contact').value.trim();
      if(!d.client.name){ showToast('Please add a client name'); return; }
    }

    // sync the delivery line item in the invoice to match fulfillment choice — always keep it last
    const deliveryItem = d.fulfillment==='collection'
      ? {desc:'Pretoria Delivery (Collection)', qty:1, unitPrice:0, discount:0}
      : {desc:'Pretoria Delivery', qty:1, unitPrice:d.deliveryFee||0, discount:0};
    d.items = d.items.filter(it=>!/delivery/i.test(it.desc||''));
    d.items.push(deliveryItem);

    state.view='step2'; render();
  };
}

/* ---------- STEP 2: items ---------- */
function renderStep2(app){
  const d=state.draft;
  app.appendChild(backRow('Items', ()=>{state.view='step1'; render();}));
  app.appendChild(progress(2));
  app.appendChild(numberBanner(d));
  const content=document.createElement('div'); content.className='content';
  content.id='items-content';
  app.appendChild(content);
  renderItemsList();

  function renderItemsList(){
    const c=document.getElementById('items-content');
    c.innerHTML='';

    if(d.items.length===0){
      const empty=document.createElement('div');
      empty.style.cssText='text-align:center;color:var(--ink-soft);font-size:13.5px;padding:18px 4px;';
      empty.textContent='No items yet — add one below.';
      c.appendChild(empty);
    }

    d.items.forEach((it,idx)=>{
      const card=document.createElement('div'); card.className='item-card';
      const rows=(it.desc||'').split('\n').length;
      const hasCat = !!it.cat;
      const descField = hasCat
        ? `<input type="text" class="it-desc" data-idx="${idx}" list="dl-${cssEscape(it.cat)}" placeholder="e.g. Vanilla Cupcakes" value="${escapeAttr(it.desc)}">`
        : `<textarea class="it-desc" data-idx="${idx}" rows="${Math.min(Math.max(rows,1),5)}" placeholder="e.g. Vanilla Cupcakes">${escapeHtml(it.desc)}</textarea>`;
      card.innerHTML=`
        <button class="rm" data-idx="${idx}">Remove</button>
        <label style="margin-top:0;">Description ${hasCat?`<span style="text-transform:none;font-weight:400;color:var(--ink-soft);">— type to swap within ${escapeHtml(it.cat)}</span>`:''}</label>
        ${descField}
        <div class="row3">
          <div><label>Qty</label><input type="number" inputmode="decimal" class="it-qty" data-idx="${idx}" value="${it.qty}"></div>
          <div><label>Unit Price</label><input type="number" inputmode="decimal" class="it-price" data-idx="${idx}" value="${it.unitPrice}"></div>
          <div><label>Discount</label><input type="number" inputmode="decimal" class="it-disc" data-idx="${idx}" value="${it.discount}"></div>
        </div>
        <div class="line-total">${fmtMoney(computeItemTotal(it))}</div>
      `;
      c.appendChild(card);
    });

    // datalists for category-swappable items (native type-ahead, zero extra weight)
    const catsNeeded=new Set(d.items.filter(it=>it.cat).map(it=>it.cat));
    catsNeeded.forEach(cat=>{
      const dl=document.createElement('datalist');
      dl.id='dl-'+cssEscape(cat);
      loadMenu().filter(m=>m.cat===cat).forEach(m=>{
        const opt=document.createElement('option'); opt.value=m.name; dl.appendChild(opt);
      });
      c.appendChild(dl);
    });

    const favCustomer = d.customerName ? findCustomer(d.customerName) : null;
    if(favCustomer && favCustomer.favoriteItems && favCustomer.favoriteItems.length){
      const already = new Set(d.items.map(it=>it.desc));
      const favs = favCustomer.favoriteItems.filter(f=>!already.has(f.desc));
      if(favs.length){
        const favCard=document.createElement('div');
        favCard.className='kv-card';
        favCard.style.cssText='margin-bottom:14px;border-color:var(--berry);';
        favCard.innerHTML=`
          <h4 style="font-size:12.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--berry-dark);margin-bottom:10px;font-weight:600;">${escapeHtml(favCustomer.name)}'s Usual Order</h4>
          ${favs.map((f,i)=>`
            <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;${i<favs.length-1?'border-bottom:1px solid var(--line);':''}">
              <div style="font-size:14px;flex:1;padding-right:10px;">${escapeHtml(f.desc)}<div style="font-size:12px;color:var(--ink-soft);">${fmtMoney(f.unitPrice)} each</div></div>
              <input type="number" inputmode="decimal" class="fav-qty" data-i="${i}" value="${f.qty||0}" style="width:64px;padding:8px;text-align:center;">
            </div>
          `).join('')}
          <button class="btn-secondary" id="fav-add-btn" style="margin-top:12px;">Add to Invoice</button>
        `;
        c.appendChild(favCard);
        favCard.querySelector('#fav-add-btn').onclick=()=>{
          const qtyInputs=favCard.querySelectorAll('.fav-qty');
          let added=0;
          qtyInputs.forEach(inp=>{
            const qty=parseFloat(inp.value)||0;
            if(qty>0){
              const f=favs[parseInt(inp.dataset.i)];
              insertItem(d, {desc:f.desc, qty, unitPrice:f.unitPrice, discount:0});
              added++;
            }
          });
          if(added>0){ showToast('Added '+favCustomer.name+"'s usual order"); renderItemsList(); }
        };
      }
    }

    const btnRow=document.createElement('div');
    btnRow.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;';
    const menuBtn=document.createElement('button');
    menuBtn.className='add-item-btn'; menuBtn.textContent='+ Menu Item';
    menuBtn.onclick=()=>{ state.view='menuPicker'; render(); };
    const cakeBtn=document.createElement('button');
    cakeBtn.className='add-item-btn'; cakeBtn.textContent='+ Build a Cake';
    cakeBtn.onclick=()=>{ state.view='cakeBuilder'; render(); };
    btnRow.appendChild(menuBtn); btnRow.appendChild(cakeBtn);
    c.appendChild(btnRow);

    const customBtn=document.createElement('button');
    customBtn.className='add-item-btn'; customBtn.style.marginTop='8px'; customBtn.textContent='+ Custom Item';
    customBtn.onclick=()=>{ insertItem(d, {desc:'',qty:1,unitPrice:0,discount:0,custom:true}); renderItemsList(); };
    c.appendChild(customBtn);

    const nextBtn=document.createElement('button');
    nextBtn.className='btn-primary'; nextBtn.textContent='Continue to Review';
    nextBtn.onclick=()=>{
      const valid=d.items.some(it=>it.desc.trim()!=='');
      if(!valid){ showToast('Add at least one item'); return; }
      state.view='step3'; render();
    };
    c.appendChild(nextBtn);

    c.querySelectorAll('.rm').forEach(b=>b.onclick=(e)=>{
      const i=parseInt(e.target.dataset.idx); d.items.splice(i,1); renderItemsList();
    });
    c.querySelectorAll('.it-desc').forEach(el=>el.oninput=(e)=>{
      const idx=e.target.dataset.idx;
      d.items[idx].desc=e.target.value;
      const it=d.items[idx];
      if(it.cat){
        const match=loadMenu().find(m=>m.cat===it.cat && m.name===e.target.value);
        if(match){
          it.unitPrice=match.price;
          const card=e.target.closest('.item-card');
          card.querySelector('.it-price').value=match.price;
          card.querySelector('.line-total').textContent=fmtMoney(computeItemTotal(it));
        }
      }
    });
    c.querySelectorAll('.it-qty').forEach(el=>el.oninput=(e)=>{ d.items[e.target.dataset.idx].qty=e.target.value; updateLineTotal(e.target); });
    c.querySelectorAll('.it-price').forEach(el=>el.oninput=(e)=>{ d.items[e.target.dataset.idx].unitPrice=e.target.value; updateLineTotal(e.target); });
    c.querySelectorAll('.it-disc').forEach(el=>el.oninput=(e)=>{ d.items[e.target.dataset.idx].discount=e.target.value; updateLineTotal(e.target); });
  }
  function updateLineTotal(el){
    const card=el.closest('.item-card');
    const idx=el.dataset.idx;
    card.querySelector('.line-total').textContent=fmtMoney(computeItemTotal(d.items[idx]));
  }
}

/* ---------- MENU PICKER ---------- */
function renderMenuPicker(app){
  const d=state.draft;
  app.appendChild(backRow('Menu Items', ()=>{state.view='step2'; render();}));
  const searchRow=document.createElement('div'); searchRow.className='search-row';
  searchRow.innerHTML=`<input placeholder="Search menu..." id="menu-search">`;
  app.appendChild(searchRow);

  const menu=loadMenu();
  const cats=[...new Set(menu.map(i=>i.cat))];
  let activeCat='All';

  const pillRow=document.createElement('div');
  pillRow.style.cssText='display:flex;gap:8px;overflow-x:auto;padding:12px 20px 4px;-webkit-overflow-scrolling:touch;';
  pillRow.style.scrollbarWidth='none';
  function pillHTML(label,selected){
    return `<button class="cat-pill" data-cat="${escapeAttr(label)}" style="flex-shrink:0;padding:9px 16px;border-radius:20px;font-family:'Work Sans';font-weight:600;font-size:13.5px;white-space:nowrap;border:1.5px solid var(--berry);cursor:pointer;background:${selected?'var(--berry)':'var(--card)'};color:${selected?'#fff':'var(--berry-dark)'};">${escapeHtml(label)}</button>`;
  }
  function drawPills(){
    pillRow.innerHTML = pillHTML('All', activeCat==='All') + cats.map(cat=>pillHTML(cat, activeCat===cat)).join('');
    pillRow.querySelectorAll('.cat-pill').forEach(btn=>{
      btn.onclick=()=>{ activeCat=btn.dataset.cat; drawPills(); draw(document.getElementById('menu-search').value); };
    });
  }
  drawPills();
  app.appendChild(pillRow);

  const content=document.createElement('div'); content.className='content'; content.id='menu-list';
  app.appendChild(content);

  function draw(filter){
    const q=(filter||'').trim().toLowerCase();
    const catsToShow = activeCat==='All' ? cats : [activeCat];
    const list=document.getElementById('menu-list');
    list.innerHTML='';
    catsToShow.forEach(cat=>{
      const items=menu.filter(i=>i.cat===cat && (!q || i.name.toLowerCase().includes(q)));
      if(items.length===0) return;
      if(activeCat==='All'){
        const h=document.createElement('h4'); h.style.cssText='font-size:12.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);margin:16px 0 8px;font-weight:600;';
        h.textContent=cat;
        list.appendChild(h);
      }
      items.forEach(item=>{
        const row=document.createElement('div'); row.className='inv-card'; row.style.marginBottom='8px';
        row.innerHTML=`<div class="left"><div class="name" style="font-size:15px;">${escapeHtml(item.name)}</div></div><div class="right"><div class="amt">${fmtMoney(item.price)}</div></div>`;
        row.onclick=()=>{
          insertItem(d, {desc:item.name, qty:1, unitPrice:item.price, discount:0});
          showToast('Added '+item.name);
          state.view='step2'; render();
        };
        list.appendChild(row);
      });
    });
    if(list.innerHTML===''){
      list.innerHTML=`<div class="empty-state"><p>No items match${q?` "${escapeHtml(filter)}"`:' this filter'}.</p></div>`;
    }
  }
  document.getElementById('menu-search').oninput=(e)=>draw(e.target.value);
  draw('');
}

/* ---------- CAKE BUILDER ---------- */
function renderCakeBuilder(app){
  const d=state.draft;
  app.appendChild(backRow('Build a Cake', ()=>{state.view='step2'; render();}));
  const content=document.createElement('div'); content.className='content';

  function opts(arr, selected){ return arr.map(v=>`<option value="${escapeAttr(v)}" ${v===selected?'selected':''}>${escapeHtml(v)}</option>`).join(''); }

  function tierBlock(prefix, label){
    return `
      <label style="${label?'':'margin-top:0;'}">${label?label+' Size':'Size'}</label>
      <select id="ck-size${prefix}">${opts(CAKE_SIZES, CAKE_SIZES[2])}</select>
      <input type="text" id="ck-size${prefix}-custom" placeholder="e.g. Heart Shaped, Number 7, Football" style="display:none;margin-top:8px;">

      <label>${label?label+' Layers':'Layers'}</label>
      <select id="ck-layers${prefix}">${opts(CAKE_LAYERS, CAKE_LAYERS[1])}</select>

      <label>${label?label+' Flavour':'Flavour'}</label>
      <select id="ck-flavor${prefix}">${opts(CAKE_FLAVORS, CAKE_FLAVORS[0])}</select>
      <input type="text" id="ck-flavor${prefix}-other" placeholder="Type flavour" style="display:none;margin-top:8px;">

      <label>${label?label+' Filling':'Filling'}</label>
      <select id="ck-filling${prefix}">${opts(CAKE_FILLINGS, CAKE_FILLINGS[0])}</select>
      <input type="text" id="ck-filling${prefix}-other" placeholder="Type filling" style="display:none;margin-top:8px;">
    `;
  }

  content.innerHTML=`
    <label style="margin-top:0;">Tier</label>
    <select id="ck-tier">${opts(CAKE_TIERS, CAKE_TIERS[0])}</select>

    <div id="ck-tier1-wrap">${tierBlock('', '')}</div>
    <div id="ck-tier2-wrap" style="display:none;">${tierBlock('2', 'Top Tier')}</div>

    <label>Decoration line 1</label>
    <input type="text" id="ck-deco1" placeholder="e.g. Covered in Red Buttercream, Soccer Themed, with">
    <label>Decoration line 2</label>
    <input type="text" id="ck-deco2" placeholder="e.g. 7th Birthday Board, Choc Drip and Name on Cake">

    <div class="row2">
      <div><label>Qty</label><input type="number" inputmode="decimal" id="ck-qty" value="1"></div>
      <div><label>Price</label><input type="number" inputmode="decimal" id="ck-price" value="0"></div>
    </div>
    <p class="hint" id="ck-price-hint">Price is a starting suggestion based on size &amp; layers — adjust freely for flavour and decoration.</p>

    <div class="kv-card" style="margin-top:16px;">
      <h4 style="font-size:12.5px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;">Preview</h4>
      <div id="ck-preview" style="font-size:14px;line-height:1.5;white-space:pre-line;text-align:center;"></div>
    </div>

    <button class="btn-primary" id="ck-add">Add Cake to Invoice</button>
  `;
  app.appendChild(content);

  function isDouble(){ return document.getElementById('ck-tier').value==='Double Tier'; }

  function tierValues(prefix){
    const sizeSel=document.getElementById('ck-size'+prefix).value;
    const size = sizeSel==='Custom Size/Shape' ? (document.getElementById('ck-size'+prefix+'-custom').value.trim()||'Custom Size') : sizeSel;
    const layers=document.getElementById('ck-layers'+prefix).value;
    const flavorSel=document.getElementById('ck-flavor'+prefix).value;
    const flavor = flavorSel==='Other' ? (document.getElementById('ck-flavor'+prefix+'-other').value.trim()||'Custom Flavour') : flavorSel;
    const fillingSel=document.getElementById('ck-filling'+prefix).value;
    const filling = fillingSel==='Other' ? (document.getElementById('ck-filling'+prefix+'-other').value.trim()||'Custom Filling') : fillingSel;
    return {sizeSel, size, layers, flavor, filling};
  }

  function buildDesc(){
    const t1=tierValues('');
    const deco1=document.getElementById('ck-deco1').value.trim();
    const deco2=document.getElementById('ck-deco2').value.trim();
    let lines;
    if(isDouble()){
      const t2=tierValues('2');
      lines=[
        `Double Tier Cake:`,
        `Bottom — ${t1.layers} ${t1.flavor} (${t1.size}) with ${t1.filling}`,
        `Top — ${t2.layers} ${t2.flavor} (${t2.size}) with ${t2.filling}`
      ];
    } else {
      lines=[`${t1.layers} ${t1.flavor} Cake (${t1.size}) with ${t1.filling}`];
    }
    if(deco1) lines.push(deco1);
    if(deco2) lines.push(deco2);
    return lines.join('\n');
  }
  function updatePreview(){ document.getElementById('ck-preview').textContent=buildDesc(); }
  function updatePriceSuggestion(){
    const t1=tierValues('');
    let price=cakeBasePrice(t1.sizeSel==='Custom Size/Shape'?'25cm':t1.sizeSel, t1.layers);
    if(isDouble()){
      const t2=tierValues('2');
      price += cakeBasePrice(t2.sizeSel==='Custom Size/Shape'?'17cm':t2.sizeSel, t2.layers) + CAKE_TIER_ASSEMBLY_FEE;
    }
    document.getElementById('ck-price').value=price;
  }
  function updateTierUI(){
    const dbl=isDouble();
    document.getElementById('ck-tier2-wrap').style.display = dbl ? 'block' : 'none';
    document.getElementById('ck-price-hint').textContent = dbl
      ? `Price is a starting suggestion: both tiers' base prices plus a R${CAKE_TIER_ASSEMBLY_FEE} tiering/assembly fee — adjust freely for flavour, filling and decoration.`
      : "Price is a starting suggestion based on size & layers — adjust freely for flavour, filling and decoration.";
  }

  function wireTier(prefix){
    document.getElementById('ck-size'+prefix).addEventListener('change', (e)=>{
      document.getElementById('ck-size'+prefix+'-custom').style.display = e.target.value==='Custom Size/Shape' ? 'block' : 'none';
      updatePriceSuggestion(); updatePreview();
    });
    document.getElementById('ck-size'+prefix+'-custom').addEventListener('input', updatePreview);
    document.getElementById('ck-layers'+prefix).addEventListener('change', ()=>{ updatePriceSuggestion(); updatePreview(); });
    document.getElementById('ck-flavor'+prefix).addEventListener('change', (e)=>{
      document.getElementById('ck-flavor'+prefix+'-other').style.display = e.target.value==='Other' ? 'block' : 'none';
      updatePreview();
    });
    document.getElementById('ck-flavor'+prefix+'-other').addEventListener('input', updatePreview);
    document.getElementById('ck-filling'+prefix).addEventListener('change', (e)=>{
      document.getElementById('ck-filling'+prefix+'-other').style.display = e.target.value==='Other' ? 'block' : 'none';
      updatePreview();
    });
    document.getElementById('ck-filling'+prefix+'-other').addEventListener('input', updatePreview);
  }

  document.getElementById('ck-tier').addEventListener('change', ()=>{ updateTierUI(); updatePriceSuggestion(); updatePreview(); });
  wireTier(''); wireTier('2');
  ['ck-deco1','ck-deco2'].forEach(id=>document.getElementById(id).addEventListener('input',updatePreview));
  updateTierUI();
  updatePriceSuggestion();
  updatePreview();

  document.getElementById('ck-add').onclick=()=>{
    const desc=buildDesc();
    const qty=parseFloat(document.getElementById('ck-qty').value)||1;
    const price=parseFloat(document.getElementById('ck-price').value)||0;
    insertItem(d, {desc, qty, unitPrice:price, discount:0});
    showToast('Cake added to invoice');
    state.view='step2'; render();
  };
}

/* ---------- MANAGE CUSTOMERS (settings) ---------- */
function renderManageCustomers(app){
  app.appendChild(backRow('Manage Customers', ()=>{state.view='settings'; render();}));
  const searchRow=document.createElement('div'); searchRow.className='search-row';
  searchRow.innerHTML=`<input placeholder="Search customers..." id="cust-search">`;
  app.appendChild(searchRow);
  const content=document.createElement('div'); content.className='content'; content.id='manage-cust-content';
  app.appendChild(content);

  let editIdx=null; // index (in sorted list) currently being edited, or null for "add new"

  function draw(filter){
    const customers=loadCustomers().sort((a,b)=>a.name.localeCompare(b.name));
    const q=(filter||'').trim().toLowerCase();
    const list=q? customers.filter(c=>c.name.toLowerCase().includes(q)) : customers;
    const c=document.getElementById('manage-cust-content');
    c.innerHTML='';

    list.forEach(cust=>{
      const idx=customers.indexOf(cust);
      const row=document.createElement('div'); row.className='kv-card'; row.style.marginBottom='8px'; row.style.padding='12px 14px';
      row.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div>
            <div style="font-weight:600;font-size:14.5px;">${escapeHtml(cust.name)}</div>
            <div style="font-size:12.5px;color:var(--ink-soft);margin-top:2px;">
              ${escapeHtml(cust.addr1||'')}${cust.addr2?', '+escapeHtml(cust.addr2):''} · ${escapeHtml(cust.contact||'no number')}
            </div>
            <span class="badge ${cust.type==='business'?'business':'private'}" style="margin-top:6px;">${cust.type==='business'?'Business':'Private'}</span>
            <span class="badge private" style="margin-top:6px;margin-left:4px;">
              ${cust.fulfillment==='delivery' ? 'Delivery · R'+cust.deliveryFee : 'Collection'}
            </span>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;align-items:flex-end;">
            <button data-idx="${idx}" class="edit-cust" style="border:none;background:none;color:var(--berry-dark);font-size:13px;font-weight:600;">Edit</button>
            <button data-idx="${idx}" class="rm-cust" style="border:none;background:none;color:var(--danger);font-size:13px;font-weight:600;">Delete</button>
          </div>
        </div>`;
      c.appendChild(row);
    });
    if(list.length===0){
      c.innerHTML=`<div class="empty-state"><p>No customers match "${escapeHtml(filter)}".</p></div>`;
    }
    c.querySelectorAll('.rm-cust').forEach(b=>b.onclick=(e)=>{
      const i=parseInt(e.target.dataset.idx);
      const all=loadCustomers().sort((a,b)=>a.name.localeCompare(b.name));
      all.splice(i,1); saveCustomers(all); draw(document.getElementById('cust-search').value);
      showToast('Customer removed');
    });
    c.querySelectorAll('.edit-cust').forEach(b=>b.onclick=(e)=>{
      editIdx=parseInt(e.target.dataset.idx);
      renderForm(customers[editIdx]);
      document.getElementById('nc-box').scrollIntoView({behavior:'smooth', block:'start'});
    });

    renderForm(editIdx!=null ? customers[editIdx] : null);
  }

  function renderForm(cust){
    const isEdit=!!cust;

        <label>Contact Person</label>

        <label>Email</label>

      <input type="text" id="nc-addr1" placeholder="Address line 1" value="${escapeAttr(v.addr1)}" style="margin-bottom:8px;">

      <label>Usual Fulfillment</label>

        <button type="button" id="nc-fulfil-collection" class="btn-secondary" style="margin-top:0;">Collection</button>

      <button class="btn-primary" id="nc-save" style="margin-top:14px;">${isEdit?'Save Changes':'Add Customer'}</button>
      ${isEdit?`<button class="btn-ghost" id="nc-cancel">Cancel Edit</button>`:''}

    document.getElementById('manage-cust-content').appendChild(addBox);

    function setTypeUI(type){
      const privBtn=document.getElementById('nc-type-private'), bizBtn=document.getElementById('nc-type-business');
      privBtn.style.background = type==='private' ? 'var(--berry)' : 'var(--card)';
      privBtn.style.color = type==='private' ? '#fff' : 'var(--ink)';
      bizBtn.style.background = type==='business' ? 'var(--berry)' : 'var(--card)';
      bizBtn.style.color = type==='business' ? '#fff' : 'var(--ink)';
      document.getElementById('nc-biz-fields').style.display = type==='business' ? 'block' : 'none';
      document.getElementById('nc-name').placeholder = type==='business' ? 'Company (Pty) Ltd' : 'Full name';
      document.getElementById('nc-name-label').textContent = type==='business' ? 'Company Name' : 'Name';
      addBox._type=type;
    }
    function setFeeUI(mode){
      const collBtn=document.getElementById('nc-fulfil-collection'), delBtn=document.getElementById('nc-fulfil-delivery');
      collBtn.style.background = mode==='collection' ? 'var(--berry)' : 'var(--card)';
      collBtn.style.color = mode==='collection' ? '#fff' : 'var(--ink)';
      delBtn.style.background = mode==='delivery' ? 'var(--berry)' : 'var(--card)';

}

/* ---------- STEP 3: review ---------- */
function renderStep3(app){
  const d=state.draft;
  app.appendChild(backRow('Review & Save', ()=>{state.view='step2'; render();}));
  app.appendChild(progress(3));
  app.appendChild(numberBanner(d));
  const content=document.createElement('div'); content.className='content';
  const subtotal=computeSubtotal(d.items);

  content.innerHTML=`
    <div class="kv-card">
      <div class="kv-row"><span>Client</span><span>${escapeHtml(d.client.name||d.client.companyName)}</span></div>
      <div class="kv-row"><span>Job</span><span>${escapeHtml(d.job||'—')}</span></div>
      <div class="kv-row"><span>Date</span><span>${fmtDate(d.date)}</span></div>
      <div class="kv-row"><span>Type</span><span>${d.type==='business'?'Business':'Private'}</span></div>
      <div class="kv-row"><span>Document</span><span>${d.docType==='proforma'?'Proforma (Quote)':'Invoice'}</span></div>
    </div>
    <label>Deposit Received</label>
    <input type="number" inputmode="decimal" id="f-deposit" value="${d.deposit||0}">
    <label>Notes (optional, shown on PDF)</label>
    <textarea id="f-notes" placeholder="e.g. Thank you for your order!">${escapeHtml(d.notes||'')}</textarea>

    <div class="summary-card">
      <div class="summary-row"><span>Invoice Subtotal</span><span>${fmtMoney(subtotal)}</span></div>
      <div class="summary-row" id="deposit-row"><span>Deposit Received</span><span>-${fmtMoney(d.deposit||0)}</span></div>
      <div class="summary-row total"><span>Total Due</span><span id="total-due">${fmtMoney(subtotal-(d.deposit||0))}</span></div>
    </div>

    <button class="btn-primary" id="save-btn">${state.editingId ? 'Save Revision &amp; Generate PDF' : 'Save &amp; Generate PDF'}</button>
  `;
  app.appendChild(content);

  document.getElementById('f-deposit').oninput=(e)=>{
    d.deposit=parseFloat(e.target.value)||0;
    document.getElementById('deposit-row').innerHTML=`<span>Deposit Received</span><span>-${fmtMoney(d.deposit)}</span>`;
    document.getElementById('total-due').textContent=fmtMoney(subtotal-d.deposit);
  };
  document.getElementById('f-notes').oninput=(e)=>{ d.notes=e.target.value; };

  document.getElementById('save-btn').onclick=()=>{
    const list=loadInvoices();
    const newMenuCount=saveCustomItemsToMenu(d.items);
    if(state.editingId){
      const idx=list.findIndex(i=>i.id===state.editingId);
      if(idx<0){ showToast('Could not find original invoice'); return; }
      const prev=list[idx];
      const snapshot=JSON.parse(JSON.stringify(prev));
      delete snapshot.history;
      snapshot.savedAt=new Date().toISOString();
      d.history=[...(prev.history||[]), snapshot];
      d.revision=(prev.revision||1)+1;
      d.number=prev.number;
      d.id=prev.id;
      list[idx]=d;
      saveInvoices(list);
      generatePDF(d);
      showToast('Invoice #'+displayInvoiceNumber(d)+' updated'+(newMenuCount?' · '+newMenuCount+' new menu item'+(newMenuCount>1?'s':'')+' saved':''));
      state.viewingId=d.id; state.editingId=null; state.draft=null; state.view='detail'; render();
    } else {
      let number, key, next;
      if(d.manualNumber){
        number=d.manualNumber;
        key=number.slice(0,4);
        next=parseInt(number.slice(4,6),10);
      } else {
        ({number,key,next}=nextInvoiceNumber(d.date));
      }
      d.number=number; d.id=uid();
      list.push(d); saveInvoices(list);
      const seq=loadSeq(); seq[key]=Math.max(seq[key]||0, next); saveSeq(seq);
      generatePDF(d);
      showToast((d.docType==='proforma'?'Quote #':'Invoice #')+number+' saved'+(newMenuCount?' · '+newMenuCount+' new menu item'+(newMenuCount>1?'s':'')+' saved':''));
      state.viewingId=d.id; state.draft=null; state.view='detail'; render();
    }
  };
}

/* ---------- REVISION HISTORY ---------- */
function renderRevisionHistory(app){
  const inv=loadInvoices().find(i=>i.id===state.viewingId);
  if(!inv){ state.view='home'; render(); return; }
  app.appendChild(backRow('Revision History', ()=>{state.view='detail'; render();}));
  const content=document.createElement('div'); content.className='content';

  const versions=[...(inv.history||[]), inv];
  content.innerHTML = versions.map((v,i)=>{
    const isCurrent = i===versions.length-1;
    const total=computeSubtotal(v.items)-(parseFloat(v.deposit)||0);
    const savedLabel = isCurrent ? 'Current version' : ('Saved '+new Date(v.savedAt).toLocaleString('en-ZA',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}));
    return `
      <div class="kv-card" style="margin-bottom:10px;${isCurrent?'border-color:var(--berry);':''}">
        <div class="kv-row"><span style="font-weight:600;color:${isCurrent?'var(--berry-dark)':'var(--ink)'};">Revision ${v.revision||1}${isCurrent?' (latest)':''}</span><span>${fmtMoney(total)}</span></div>
        <div class="kv-row"><span>${escapeHtml(savedLabel)}</span><span></span></div>
        <div class="kv-row"><span>Date on invoice</span><span>${fmtDate(v.date)}</span></div>
        <div class="action-grid">
          <button class="btn-secondary" data-pdf-i="${i}" style="margin-top:10px;">Download PDF</button>
          ${isCurrent?'':`<button class="btn-secondary" data-restore-i="${i}" style="margin-top:10px;">Restore this version</button>`}
        </div>
      </div>
    `;
  }).join('');
  app.appendChild(content);

  content.querySelectorAll('button[data-pdf-i]').forEach(btn=>{
    btn.onclick=()=>{ generatePDF(versions[parseInt(btn.dataset.pdfI)]); };
  });
  content.querySelectorAll('button[data-restore-i]').forEach(btn=>{
    btn.onclick=()=>{
      const target=versions[parseInt(btn.dataset.restoreI)];
      if(!confirm(`Restore Revision ${target.revision||1}? This will become the new current version (as Revision ${(inv.revision||1)+1}).`)) return;
      const list=loadInvoices();
      const idx=list.findIndex(i=>i.id===inv.id);
      const snapshot=JSON.parse(JSON.stringify(inv));
      delete snapshot.history;
      snapshot.savedAt=new Date().toISOString();
      const restored=JSON.parse(JSON.stringify(target));
      delete restored.savedAt;
      restored.history=[...(inv.history||[]), snapshot];
      restored.revision=(inv.revision||1)+1;
      restored.id=inv.id; restored.number=inv.number;
      list[idx]=restored;
      saveInvoices(list);
      showToast('Restored Revision '+(target.revision||1)+' as Revision '+restored.revision);
      state.view='detail'; render();
    };
  });
}

  document.getElementById('manage-cust-btn').onclick=()=>{ state.view='manageCustomers'; render(); };
}

/* ---------- helpers ---------- */
function escapeHtml(str){ return (str||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- PDF generation (matches Anicka's original invoice template) ---------- */
function generatePDF(inv){
  const s=loadSettings();
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF({unit:'pt', format:'a4'});
  const pageW=doc.internal.pageSize.getWidth();
  const pageH=doc.internal.pageSize.getHeight();

  const PINK=[242,163,167];       // header / total fill
  const PINK_TITLE=[235,117,123]; // INVOICE title
  const BLACK=[0,0,0];
  const GREY=[90,90,90];

  const M=44;                 // text margin
  const borderL=24, borderT=40, borderR=pageW-24, borderB=pageH-96;

  doc.setDrawColor(...BLACK); doc.setLineWidth(1.1);
  doc.rect(borderL, borderT, borderR-borderL, borderB-borderT);

  /* ---- Title ---- */
  const isProforma = inv.docType==='proforma';
  doc.setFont('times','bold'); doc.setTextColor(...PINK_TITLE);
  if(isProforma){
    doc.setFontSize(22);
    doc.text('PROFORMA', M, 78);
    doc.text('INVOICE', M, 100);
  } else {
    doc.setFontSize(26);
    doc.text('INVOICE', M, 90);
  }

  /* ---- Logo (top right) ---- */
  const logoW=150, logoH=logoW*(424/640);
  doc.addImage(LOGO_IMG,'PNG', borderR-logoW-14, borderT+8, logoW, logoH);

  /* ---- Invoice #/date/job block ---- */
  let ly = isProforma ? 128 : 118;
  const labelX = M+90;
  doc.setFont('times','bold'); doc.setFontSize(10.5); doc.setTextColor(...BLACK);
  doc.text('Invoice #:', labelX, ly, {align:'right'});
  doc.setFont('times','normal'); doc.text(displayInvoiceNumber(inv), labelX+6, ly);
  ly+=15;
  doc.setFont('times','bold'); doc.text('Invoice date:', labelX, ly, {align:'right'});
  doc.setFont('times','normal'); doc.text(fmtDateShort(inv.date), labelX+6, ly);
  ly+=15;
  if(inv.job){
    doc.setFont('times','bold'); doc.text('Job:', labelX, ly, {align:'right'});
    doc.setFont('times','normal'); doc.text(inv.job, labelX+6, ly);
    ly+=15;
  }

  /* ---- From / Bill To ---- */
  let fy = ly+22;
  doc.setFont('times','bolditalic'); doc.setFontSize(11); doc.setTextColor(...BLACK);
  doc.text(s.businessName, M, fy); fy+=15;
  doc.setFont('times','normal'); doc.setFontSize(10.5);
  s.addressLines.filter(Boolean).forEach(l=>{ doc.text(l, M, fy); fy+=14; });
  fy+=8;
  doc.text('C: '+s.cell, M, fy); fy+=14;
  doc.text(s.email, M, fy); fy+=14;

  const bx=M+270, vx=bx+58;
  let ty = ly+22;
  doc.setFont('times','bold'); doc.setFontSize(10.5);
  if(inv.type==='business'){
    doc.text('Bill to:', bx, ty); doc.setFont('times','normal'); doc.text(inv.client.companyName||'', vx, ty); ty+=14;
    const addrLines=[inv.client.addr1, inv.client.addr2, inv.client.addr3].filter(Boolean);
    if(addrLines.length){ doc.setFont('times','bold'); doc.text('Address:', bx, ty); doc.setFont('times','normal'); doc.text(addrLines[0], vx, ty); ty+=14;
      addrLines.slice(1).forEach(l=>{ doc.text(l, vx, ty); ty+=14; }); }
    if(inv.client.vatNo){ doc.setFont('times','bold'); doc.text('VAT No:', bx, ty); doc.setFont('times','normal'); doc.text(inv.client.vatNo, vx, ty); ty+=14; }
    if(inv.client.contactPerson){ doc.setFont('times','bold'); doc.text('Contact:', bx, ty); doc.setFont('times','normal'); doc.text(inv.client.contactPerson, vx, ty); ty+=14; }
    if(inv.client.email){ doc.setFont('times','bold'); doc.text('Email:', bx, ty); doc.setFont('times','normal'); doc.text(inv.client.email, vx, ty); ty+=14; }
    if(inv.client.contact){ doc.setFont('times','bold'); doc.text('Cell:', bx, ty); doc.setFont('times','normal'); doc.text(inv.client.contact, vx, ty); ty+=14; }
  } else {
    doc.text('Bill to:', bx, ty); doc.setFont('times','normal'); doc.text(inv.client.name||'', vx, ty); ty+=14;
    const addrLines=[inv.client.addr1, inv.client.addr2, inv.client.addr3].filter(Boolean);
    if(addrLines.length){ doc.setFont('times','bold'); doc.text('Address:', bx, ty); doc.setFont('times','normal'); doc.text(addrLines[0], vx, ty); ty+=14;
      addrLines.slice(1).forEach(l=>{ doc.text(l, vx, ty); ty+=14; }); }
    if(inv.client.contact){ doc.setFont('times','bold'); doc.text('Contact:', bx, ty); doc.setFont('times','normal'); doc.text(inv.client.contact, vx, ty); ty+=14; }
  }

  let curY=Math.max(fy,ty)+18;

  /* ---- Items table ---- */
  const rows=inv.items.filter(it=>it.desc && it.desc.trim()!=='').map((it,i)=>[
    String(i+1),
    it.desc||'',
    String(it.qty||0),
    fmtMoney(it.unitPrice||0),
    parseFloat(it.discount)? fmtMoney(it.discount) : '',
    fmtMoney(computeItemTotal(it))
  ]);
  const tableW=borderR-borderL-2;
  const colW={0:0.10,1:0.36,2:0.09,3:0.15,4:0.15,5:0.15};

  doc.autoTable({
    startY:curY,
    margin:{left:borderL+1,right:pageW-borderR+1},
    tableWidth:tableW,
    head:[['Item #','Description','Qty','Unit price','Discount per Unit','Price']],
    body:rows,
    theme:'grid',
    styles:{font:'times', fontSize:10, textColor:BLACK, lineColor:BLACK, lineWidth:0.75, cellPadding:{top:5,bottom:5,left:5,right:5}},
    headStyles:{fillColor:PINK, textColor:BLACK, fontStyle:'bold', halign:'center', lineColor:BLACK, lineWidth:0.75},
    bodyStyles:{fillColor:[255,255,255]},
    columnStyles:{
      0:{halign:'center', cellWidth:tableW*colW[0]},
      1:{halign:'center', cellWidth:tableW*colW[1]},
      2:{halign:'center', cellWidth:tableW*colW[2]},
      3:{halign:'center', cellWidth:tableW*colW[3]},
      4:{halign:'center', cellWidth:tableW*colW[4]},
      5:{halign:'center', cellWidth:tableW*colW[5]}
    }
  });

  let afterTableY=doc.lastAutoTable.finalY+4;
  const subtotal=computeSubtotal(inv.items);
  const deposit=parseFloat(inv.deposit)||0;
  const total=subtotal-deposit;

  const boxW=tableW*(colW[4]+colW[5]);
  const boxX=borderR-1-boxW;
  const rowH=18;

  function sumRow(label, value, fill, bold){
    doc.setDrawColor(...BLACK); doc.setLineWidth(0.75);
    if(fill){ doc.setFillColor(...PINK); doc.rect(boxX, afterTableY, boxW, rowH, 'FD'); }
    else { doc.rect(boxX, afterTableY, boxW, rowH); }
    doc.setFont('times', bold?'bold':'normal'); doc.setFontSize(10.5); doc.setTextColor(...BLACK);
    doc.text(label, boxX+8, afterTableY+12.5);
    doc.text(value, boxX+boxW-8, afterTableY+12.5, {align:'right'});
    afterTableY+=rowH;
  }
  sumRow('Invoice Subtotal', fmtMoney(subtotal), true, false);
  sumRow('Deposit Received', fmtMoney(deposit), false, false);
  sumRow('TOTAL', fmtMoney(total), true, true);

  /* ---- Notes ---- */
  let noteY=afterTableY+22;
  if(inv.notes){
    doc.setFont('times','italic'); doc.setFontSize(10); doc.setTextColor(...GREY);
    const split=doc.splitTextToSize(inv.notes, borderR-M-20);
    doc.text(split, M, noteY);
    noteY+=split.length*13+6;
  }

  /* ---- Banking details ---- */
  let bankY=Math.max(noteY, afterTableY+22);
  doc.setFont('times','bolditalic'); doc.setFontSize(10.5); doc.setTextColor(...BLACK);
  doc.text('Banking Details', M, bankY); bankY+=15;
  doc.setFont('times','normal'); doc.setFontSize(10.5);
  doc.text(`${s.bankName} ${s.accType}: ${s.accNumber}`, M, bankY); bankY+=14;
  doc.text(`Branch Code: ${s.branchCode}`, M, bankY); bankY+=14;
  doc.text('Ref No: Invoice #', M, bankY);

  /* ---- Botanical illustration along bottom border ---- */
  const illW=borderR-borderL;
  const illH=illW*(406/1400);
  doc.addImage(BOTANICAL_IMG,'PNG', borderL, borderB-illH*0.62, illW, illH);

  /* ---- Footer disclaimer ---- */
  doc.setFont('times','italic'); doc.setFontSize(9.5); doc.setTextColor(...GREY);
  doc.text('Please send POP to Anicka either via Email or WhatsApp to secure order.', pageW/2, pageH-30, {align:'center'});

  const fname=(isProforma?'Quote_':'Invoice_')+displayInvoiceNumber(inv)+'_'+(inv.client.name||inv.client.companyName||'client').replace(/[^a-z0-9]+/gi,'')+'.pdf';
  doc.save(fname);
}
function fmtDateShort(iso){
  const d=new Date(iso+'T00:00:00');
  return (d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();
}

runOneTimeSeed();
render();
</script>
